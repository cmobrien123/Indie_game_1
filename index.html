<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hex Grid Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.05em;
      color: #a8d8ea;
    }

    #status {
      font-size: 0.95rem;
      color: #ccc;
      min-height: 1.4em;
    }

    #status.error { color: #ff6b6b; }

    /* ── Board layout ─────────────────────────────── */

    #board {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      background: #16213e;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid #0f3460;
    }

    /* Column labels row */
    #col-label-row {
      display: flex;
      align-items: flex-end;
      margin-bottom: 6px;
    }

    #row-label-spacer {
      width: 30px;
      flex-shrink: 0;
    }

    #col-labels {
      display: flex;
    }

    .col-label {
      width: 30px;
      text-align: center;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #a8d8ea;
      user-select: none;
    }

    /* Grid + row-labels row */
    #grid-row {
      display: flex;
      align-items: flex-start;
    }

    #row-labels {
      width: 30px;
      position: relative;
      flex-shrink: 0;
    }

    .row-label {
      position: absolute;
      right: 6px;
      font-size: 0.55rem;
      font-weight: 600;
      color: #a8d8ea;
      transform: translateY(-50%);
      user-select: none;
    }

    /* Hex grid container — cells are absolutely positioned inside */
    #grid-container {
      position: relative;
    }

    /* ── Hex cells ────────────────────────────────── */

    /* Pointy-top hexagon: width=30px, height=34px */
    .cell {
      position: absolute;
      width: 30px;
      height: 34px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: #0f3460;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.1s;
    }

    .cell:hover { filter: brightness(1.35); }

    .cell.occupied {
      cursor: default;
    }

    .cell.occupied.team-gar {
      background: #27ae60;
    }

    .cell.occupied.team-cis {
      background: #e91e8c;
    }

    .cell.occupied.active-player {
      outline: 2px solid #f1c40f;
      outline-offset: -2px;
      z-index: 1;
      animation: blink 0.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .player-marker {
      font-size: 10px;
      color: #fff;
      pointer-events: none;
      user-select: none;
    }

    .cell.adjacent {
      background: #1e6091;
      outline: none;
      filter: brightness(1.15);
    }

    .cell.adjacent:hover { filter: brightness(1.4); }

    /* Cell value colors */
    .cell.cell-0 { background: #555; cursor: not-allowed; }
    .cell.cell-0:hover { filter: none; }
    .cell.cell-1 { background: #e67e22; }
    .cell.cell-2 { background: #3498db; }
    .cell.cell-3 { background: #e74c3c; cursor: not-allowed; }
    .cell.cell-3:hover { filter: none; }

    .cell.orbit-owned.orbit-team-gar { background: #1a6b3a; }
    .cell.orbit-owned.orbit-team-cis { background: #8b1a5c; }

    .planet-label {
      position: absolute;
      transform: translateX(-50%);
      font-size: 7px;
      font-weight: 600;
      color: #f1c40f;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 3px #000, 0 0 6px #000;
      z-index: 2;
    }

    .player-label {
      position: absolute;
      transform: translateX(-50%);
      font-size: 6px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 3px #000, 0 0 6px #000;
      z-index: 3;
      text-align: center;
      line-height: 1.3;
    }

    #cell-tooltip {
      position: fixed;
      display: none;
      padding: 3px 7px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #fff;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 4px;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
    }

    #turn-counter {
      font-size: 0.85rem;
      color: #888;
    }

    #end-move-btn {
      margin-top: 8px;
      padding: 8px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: #e67e22;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.15s;
    }

    #end-move-btn:hover { background: #d35400; }

    #create-player-btn {
      margin-top: 8px;
      padding: 8px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: #2980b9;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.15s;
    }

    #create-player-btn:hover { background: #1f6da0; }

    .cell.placement-target {
      background: #2ecc71 !important;
      filter: brightness(1.2);
      cursor: crosshair;
    }

    .cell.placement-target:hover { filter: brightness(1.5); }

    /* ── Team stats panel ────────────────────────── */

    #team-stats {
      display: flex;
      gap: 24px;
      margin-top: 8px;
    }

    .team-panel {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 12px 16px;
      min-width: 220px;
    }

    .team-panel h2 {
      font-size: 0.8rem;
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }

    .team-panel.gar h2 { color: #27ae60; }
    .team-panel.cis h2 { color: #e91e8c; }

    .team-panel .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #ccc;
      padding: 2px 0;
    }

    .team-panel .stat-row .stat-label { color: #999; }
    .team-panel .stat-row .stat-value { font-weight: 600; color: #e0e0e0; }

    .team-panel .stat-divider {
      border: none;
      border-top: 1px solid #0f3460;
      margin: 6px 0;
    }

    /* ── Battle overlay ──────────────────────────── */

    #battle-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #battle-modal {
      background: #16213e;
      border: 2px solid #e74c3c;
      border-radius: 12px;
      padding: 24px 32px;
      min-width: 420px;
      max-width: 520px;
      color: #e0e0e0;
      text-align: center;
    }

    #battle-modal h2 {
      font-size: 1.1rem;
      color: #e74c3c;
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    #battle-modal .battle-planet {
      font-size: 0.9rem;
      color: #f1c40f;
      margin-bottom: 16px;
    }

    .battle-sides {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .battle-side {
      flex: 1;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px;
    }

    .battle-side h3 {
      font-size: 0.8rem;
      margin-bottom: 6px;
    }

    .battle-side.attacker h3 { color: #e67e22; }
    .battle-side.defender h3 { color: #3498db; }

    .battle-side .side-info {
      font-size: 0.7rem;
      color: #999;
      margin-bottom: 8px;
    }

    .battle-side .dice-result {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f1c40f;
      min-height: 2em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .roll-btn {
      padding: 6px 18px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      background: #e74c3c;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .roll-btn:hover { background: #c0392b; }
    .roll-btn:disabled { background: #555; cursor: default; }

    #battle-continue-btn {
      margin-top: 12px;
      padding: 8px 24px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      background: #27ae60;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #battle-continue-btn:hover { background: #1e8449; }

    .battle-outcome {
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 10px;
      min-height: 1.4em;
    }

    .battle-outcome.win { color: #2ecc71; }
    .battle-outcome.tie { color: #f39c12; }
  </style>
</head>
<body>
  <h1>Hex Grid Game</h1>
  <p id="status">Loading...</p>

  <div id="board">
    <div id="col-label-row">
      <div id="row-label-spacer"></div>
      <div id="col-labels"></div>
    </div>
    <div id="grid-row">
      <div id="row-labels"></div>
      <div id="grid-container"></div>
    </div>
  </div>

  <p id="turn-counter"></p>
  <button id="end-move-btn">End Move</button>
  <button id="create-player-btn">Create Player</button>
  <div id="team-stats"></div>
  <div id="cell-tooltip"></div>
  <div id="battle-overlay" style="display:none;">
    <div id="battle-modal"></div>
  </div>
  <script src="dist/bundle.js"></script>
</body>
</html>
